name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  ci:
    runs-on: ubuntu-latest
    env:
      # Só precisa existir para prisma.config.ts (validado no postinstall
      # via `prisma generate`, que não conecta de fato no banco) — os testes
      # usam seu próprio Postgres efêmero via Testcontainers
      # (tests/setup/global-setup.ts), com DATABASE_URL real definida ali.
      DATABASE_URL: "postgresql://postgres:postgres@localhost:5432/ci_placeholder"
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      # Testcontainers usa o Docker nativo do runner ubuntu-latest.
      # As suítes de isolamento de tenant (plano §8.3) entram aqui como gate.
      - name: Test
        run: pnpm test
