# Ambiente de desenvolvimento local.
# Uso: pnpm db:up -> pnpm db:migrate -> pnpm dev
# Produção (Railway) usa Postgres/Redis gerenciados — este arquivo é só dev.
services:
  web:
    build: .
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/aparatus
      REDIS_URL: redis://redis:6379
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET:-local-development-secret}
      BETTER_AUTH_URL: http://localhost:3000
      NEXT_PUBLIC_APP_URL: http://localhost:3000
      NEXT_PUBLIC_ROOT_DOMAIN: localhost:3000
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker:
    build: .
    # Migração é idempotente (Prisma usa lock advisory) — seguro rodar em
    # paralelo com o CMD do web, que também migra antes de iniciar.
    command: sh -c "pnpm db:migrate:deploy && pnpm worker"
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/aparatus
      REDIS_URL: redis://redis:6379
      RESEND_API_KEY: ${RESEND_API_KEY}
      EMAIL_FROM: ${EMAIL_FROM}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  postgres:
    image: postgres:16-alpine
    container_name: aparatus-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: aparatus
    ports:
      - "5432:5432"
    volumes:
      - aparatus-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d aparatus"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: aparatus-redis
    ports:
      - "6379:6379"
    volumes:
      - aparatus-redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  aparatus-pgdata:
  aparatus-redisdata:
